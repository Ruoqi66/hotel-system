<!DOCTYPE html>
<html lang="zh-CN">
<head>

</head>
<body>
<div class="sidebar">
    <h1 class="sidebar-title">客房管理</h1>
    <nav class="menu">
        <ul>
            <li><a href="booking.html">客房预订</a></li>
            <li><a href="roomStatus.html">客房状态</a></li>
            <li><a href="check-in-out.html">入住退房</a></li>

    </nav>
</div>
<main>
    <section id="check-in-out">
        <h2>入住退房办理</h2>
        <div class="card">
            <h3>客人入住办理</h3>
            <div class="form-group"><label>选择预订订单</label><select>
                <option value="">--请选择待入住订单--</option>
            </select></div>
            <div class="form-group"><label>身份证号码</label><input type="text" placeholder="身份验证"></div>
            <div class="form-group"><label>押金金额</label><input type="number" value="300"></div>
            <button class="btn-success">确认入住</button>
        </div>
        <div class="card">
            <h3>当前在住客人</h3>
            <table>
                <thead>
                <tr>
                    <th>房间号</th>
                    <th>客人姓名</th>
                    <th>入住日期</th>
                    <th>押金</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody>
                <tr>
                    <td>102</td>
                    <td>张女士</td>
                    <td>2026-04-23</td>
                    <td>300元</td>
                    <td>
                        <button class="btn-danger">办理退房</button>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
</body>
