<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Booking - Trips.Hotel</title>
    <link rel="stylesheet" href="../public/style.css">
    <link rel="stylesheet" href="../roomStyle/booking.css">
</head>
<body>
<div id="header-container"></div>

<main class="container">
    <h2>Online Booking</h2>
    <div class="booking-form">
        <div class="input-group">
            <label>Name</label>
            <input type="text" placeholder="Your Name">
        </div>
        <div class="input-group">
            <label>Phone</label>
            <input type="text" placeholder="Phone Number">
        </div>
        <div class="input-group">
            <label>Room Type</label>
            <select>
                <option>Standard Room</option>
                <option>Standard Suite</option>
                <option>Sea View Round Bed Room</option>
                <option>Pool Suite</option>
            </select>
        </div>
        <div class="input-group">
            <label>Check-in Date</label>
            <input type="date">
        </div>
        <div class="input-group">
            <label>Check-out Date</label>
            <input type="date">
        </div>
        <div class="input-group">
            <label>Breakfast Included</label>
            <select>
                <option value="1">Yes</option>
                <option value="0">No</option>
            </select>
        </div>
        <div class="price-display">
            Estimated Total Price: <span>¥ 0</span>
        </div>
        <div class="button-style">
            <button class="btn-primary">Submit Reservation</button>
        </div>
    </div>
</main>
<script src="../public/js.js"></script>
</body>
</html>
