            <table>
                <thead>
                <tr>
                    <th>房间号</th>
                    <th>客房类型</th>
                    <th>售价(元/晚)</th>
                    <th>房间状态</th>
                    <th>操作</th>

                </thead>
                <tbody>
                <tr>
                    <td>101</td>
                    <td>Deluxe Twin Room</td>
                    <td>1,300</td>
                    <td class="status-free">空房</td>
                    <td>
                        <button class="btn-primary">编辑</button>
                    </td>
                </tr>
                <tr>
                    <td>102</td>
                    <td>Deluxe King Room</td>
                    <td>1,200</td>
                    <td class="status-occupied">在住</td>
                    <td>
                        <button class="btn-primary">编辑</button>
                    </td>
                </tr>
                <tr>
                    <td>103</td>
                    <td>Ocean‑view Room</td>
                    <td>2,200</td>
                    <td class="status-booked">已预订</td>
                    <td>
                        <button class="btn-primary">编辑</button>
                    </td>
                </tr>
                <tr>
                    <td>201</td>
                    <td>Pool Suite</td>
                    <td>3,700</td>
                    <td>维修中</td>
                    <td>
                        <button class="btn-primary">编辑</button>
                    </td>
                </tr>
                <tr>
                    <td>201</td>
                    <td>Presidential Suite</td>
                    <td>18,888</td>
                    <td>维修中</td>
                    <td>
                        <button class="btn-primary">编辑</button>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
