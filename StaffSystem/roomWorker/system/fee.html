<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fee Settlement Management</title>
    <link rel="stylesheet" href="../public/style.css">
</head>
<body>
<div id="sidebar-container"></div>
<main>
    <section id="fee-settle">
        <h2>Fee Settlement Management</h2>
        <div class="card">
            <h3>Bill Settlement</h3>
            <div class="form-group"><label>Occupied Room Number</label><input type="text" placeholder="Enter room number"></div>
            <div class="form-group"><label>Additional Expenses</label><input type="number" value="0" placeholder="Snacks/Drinks/Services">
            </div>
            <div class="form-group">
                <label>Payment Method</label>
                <select>
                    <option>Cash Payment</option>
                    <option>Bank Card</option>
                    <option>WeChat Pay</option>
                    <option>Alipay</option>
                </select>
            </div>
            <button class="btn-primary">Settle Bill</button>
        </div>
        <div class="card">
            <h3>Settlement Records</h3>
            <table>
                <thead>
                <tr>
                    <th>Bill No.</th>
                    <th>Room</th>
                    <th>Total Consumption</th>
                    <th>Payment Method</th>
                    <th>Status</th>
                </tr>
                </thead>
                <tbody id="feeTable">
                </tbody>
            </table>
        </div>
    </section>
</main>
<script src="../../shared/data.js"></script>
<script src="../public/js.js"></script>
<script src="../js/fee.js"></script>
</body>
</html>
