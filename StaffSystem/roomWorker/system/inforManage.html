<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Information Management</title>
    <link rel="stylesheet" href="../public/style.css">
</head>
<body>
<div id="sidebar-container"></div>
<main>
    <section id="customer-manage">
        <h2>Customer Information Management</h2>
        <div class="card">
            <h3>Customer Profiles</h3>
            <table>
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Contact</th>
                    <th>Membership Level</th>
                    <th>Check-in Times</th>
                    <th>Consumption Preferences</th>
                </tr>
                </thead>
                <tbody id="customerTable">
                </tbody>
            </table>
        </div>
        <div class="card">
            <h3>Customer Satisfaction & Feedback</h3>
            <table>
                <thead>
                <tr>
                    <th>Customer</th>
                    <th>Feedback</th>
                    <th>Satisfaction</th>
                </tr>
                </thead>
                <tbody id="feedbackTable">
                </tbody>
            </table>
        </div>
    </section>
</main>
<script src="../../../shared/data.js"></script>
<script src="../public/js.js"></script>
<script src="../js/inforManage.js"></script>
</body>
</html>
