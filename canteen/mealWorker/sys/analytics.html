<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Data & Feedback - Food and beverage</title>
    <link rel="stylesheet" href="../public/style.css">
    <link rel="stylesheet" href="../css/analytics.css">
    <style>
        .dashboard-content p, .feedback-content p {
            font-size: 15px;
            margin-bottom: 10px;
            color: #34495e;
        }
    </style>
</head>
<body>
<main>
    <section id="analytics">
        <h2>Data Statistics & Customer Reviews</h2>

        <div class="card">
            <h3>Management Dashboard</h3>
            <div class="dashboard-content">
                <p>Today's Bestseller: <strong id="bestseller" style="color: #3498db;">Loading...</strong></p>
                <p>Customer Taste Preference: <strong id="preference" style="color: #2ecc71;">Loading...</strong></p>
            </div>
        </div>

        <div class="card">
            <h3>Customer Feedback</h3>
            <div class="feedback-content" id="feedbackList">
                </div>
        </div>
    </section>
</main>
<script src="../js/analytics.js"></script>
</body>
</html>
