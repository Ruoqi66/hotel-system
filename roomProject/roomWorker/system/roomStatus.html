<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Room Status</title>
    <link rel="stylesheet" href="../public/style.css">
    <link rel="stylesheet" href="../systemStyle/roomStatus.css">
</head>
<body>
<div id="sidebar-container"></div>
<main>
    <section id="room-status">
        <h2>Room Status Management</h2>
        <div class="card">
            <h3>Real-time Room Status Overview</h3>
            <table>
                <thead>
                <tr>
                    <th>Room Number</th>
                    <th>Room Type</th>
                    <th>Price (RMB/night)</th>
                    <th>Room Status</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody id="roomStatusTable">
                </tbody>
            </table>
        </div>
    </section>
</main>
<script src="../../shared/data.js"></script>
<script src="../public/js.js"></script>
<script src="../js/roomStatus.js"></script>
</body>
</html>
