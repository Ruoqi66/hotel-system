<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Reservation - Hotel Dining</title>
    <link rel="stylesheet" href="../public/style.css">
    <link rel="stylesheet" href="../cusStyle/booking.css">
</head>
<body>
<div id="header-container"></div>

<main>
    <section id="booking">
        <h2>Online Table Reservation</h2>
        <form class="booking-form">
            <div class="form-group">
                <label for="date">Date</label>
                <input type="date" id="date" name="date" required>
            </div>

            <div class="form-group">
                <label for="time">Time</label>
                <input type="time" id="time" name="time" required>
            </div>

            <div class="form-group">
                <label for="guests">Number of diners</label>
                <input type="number" id="guests" name="guests" min="1" placeholder="e.g. 2" required>
            </div>

            <button type="submit">Confirm Reservation</button>
        </form>
    </section>
</main>
<div id="footer-container"></div>
<script src="../public/common.js"></script>
<script src="../js/booking.js"></script>
</body>
</html>
