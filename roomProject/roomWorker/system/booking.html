<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>客房预订 - 客房管理子系统</title>
    <link rel="stylesheet" href="../public/style.css">
</head>
<body>
<div class="sidebar">
    <h1 class="sidebar-title">客房管理</h1>
    <nav class="menu">
        <ul>
            <li><a href="booking.html">客房预订</a></li>
            <li><a href="roomStatus.html">客房状态</a></li>
            <li><a href="check-in-out.html">入住退房</a></li>
            <li><a href="service.html">客房服务</a></li>
            <li><a href="fee.html">费用结算</a></li>
            <li><a href="inforManage.html">客户管理</a></li>
            <li><a href="data.html">数据报表</a></li>
        </ul>
    </nav>
</div>
<main>
    <section id="booking">
        <h2>客房预订</h2>
        <div class="card">
            <h3>新增线上预订</h3>
            <div class="card">
                <h3>预订表单</h3>
                <div class="form-group"><label>客人姓名:</label><input type="text" id="guestName"
                                                                       placeholder="请输入客人姓名"></div>
                <div class="form-group"><label>联系电话:</label><input type="tel" id="guestPhone"
                                                                       placeholder="请输入联系电话"></div>
                <div class="form-group"><label>入住日期:</label><input type="date" id="checkInDate"></div>
                <div class="form-group"><label>退房日期:</label><input type="date" id="checkOutDate"></div>
                <div class="form-group">
                    <label>客房类型:</label>
                    <select id="roomType">
                        <option value="Deluxe Twin Room">Deluxe Twin Room (¥1300/晚)</option>
                        <option value="Deluxe King Room">Deluxe King Room (¥1,200/晚)</option>
                        <option value="Ocean‑view Room">Ocean‑view Room (¥2,200/晚)</option>
                        <option value="Pool Suite">Pool Suite (¥3,700/晚)</option>
                        <option value="Presidential Suite">Presidential Suite (¥2,200/晚)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>是否选择早饭</label>
                    <select>
                        <option value="1">是</option>
                        <option value="0">否</option>
                    </select>
                </div>
                <div class="form-group"><label>入住人数:</label><input type="number" id="guestCount" min="1" max="4"
                                                                       value="1"></div>
                <button class="btn-primary" onclick="bookRoom()">提交预订</button>
            </div>
        </div>
        <div class="card">
            <h3>预订记录管理</h3>
            <table>
                <thead>
                <tr>
                    <th>预订编号</th>
                    <th>客户姓名</th>
                    <th>房型</th>
                    <th>入住时间</th>
                    <th>退房时间</th>
                    <th>预定早饭</th>
                    <th>预订状态</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody id="bookingTable"></tbody>
            </table>
        </div>
    </section>
</main>
</body>
</html>
