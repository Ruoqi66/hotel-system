<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Room Booking</title>
    <link rel="stylesheet" href="../public/style.css">
</head>
<body>
<div id="sidebar-container"></div>
<main>
    <section id="booking">
        <h2>Room Booking</h2>
        <div class="card">
            <h3>Add Online Booking</h3>
            <div class="card">
                <h3>Booking Form</h3>
                <div class="form-group"><label>Guest Name:</label><input type="text" id="guestName"
                                                                       placeholder="Please enter guest name"></div>
                <div class="form-group"><label>Contact Phone:</label><input type="tel" id="guestPhone"
                                                                       placeholder="Please enter contact phone"></div>
                <div class="form-group"><label>Check-in Date:</label><input type="date" id="checkInDate"></div>
                <div class="form-group"><label>Check-out Date:</label><input type="date" id="checkOutDate"></div>
                <div class="form-group">
                    <label>Room Type:</label>
                    <select id="roomType">
                        <option value="Deluxe Twin Room">Deluxe Twin Room (¥1300/night)</option>
                        <option value="Deluxe King Room">Deluxe King Room (¥1,200/night)</option>
                        <option value="Ocean‑view Room">Ocean‑view Room (¥2,200/night)</option>
                        <option value="Pool Suite">Pool Suite (¥3,700/night)</option>
                        <option value="Presidential Suite">Presidential Suite (¥2,200/night)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Breakfast Included</label>
                    <select>
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select>
                </div>
                <div class="form-group"><label>Number of Guests:</label><input type="number" id="guestCount" min="1" max="4"
                                                                       value="1"></div>
                <button class="btn-primary" onclick="bookRoom()">Submit Booking</button>
            </div>
        </div>
        <div class="card">
            <h3>Booking Record Management</h3>
            <table>
                <thead>
                <tr>
                    <th>Booking No.</th>
                    <th>Guest Name</th>
                    <th>Room Type</th>
                    <th>Check-in Time</th>
                    <th>Check-out Time</th>
                    <th>Breakfast Booked</th>
                    <th>Booking Status</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody id="bookingTable"></tbody>
            </table>
        </div>
    </section>
</main>
<script src="../../shared/data.js"></script>
<script src="../public/js.js"></script>
<script src="../js/booking.js"></script>
</body>
</html>
