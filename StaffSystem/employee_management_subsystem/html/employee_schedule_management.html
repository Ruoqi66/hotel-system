<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Employee Schedule Management</title>
    <link rel="stylesheet" href="../public/common.css">
</head>
<body>
    <main>
        <section>
            <h2>Schedule Management</h2>
            
            <div class="form-group">
                <label>Schedule Type:</label>
                <div style="display: flex; gap: 24px;">
                    <label style="display: flex; align-items: center; gap: 8px;">
                        <input type="radio" name="scheduleType" value="fixed" checked> Fixed Schedule
                    </label>
                    <label style="display: flex; align-items: center; gap: 8px;">
                        <input type="radio" name="scheduleType" value="temporary"> Temporary Schedule
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label for="employeeSelect">Employee:</label>
                <select id="employeeSelect">
                    <option value="">Select Employee</option>
                </select>
            </div>

            <div class="form-group">
                <label for="scheduleDate">Schedule Date:</label>
                <input type="week" id="scheduleDate">
            </div>

            <h3>Daily Schedule</h3>
            
            <div class="card">
                <div class="form-row" style="gap: 12px;">
                    <div style="flex: 0 0 100px;">Monday:</div>
                    <input type="time" id="mon-start" value="09:00" style="flex: 0 0 100px;">
                    <span style="margin: auto 8px;">to</span>
                    <input type="time" id="mon-end" value="18:00" style="flex: 0 0 100px;">
                    <select id="mon-type" style="flex: 0 0 90px;">
                        <option value="work">Work</option>
                        <option value="dayoff">Day Off</option>
                    </select>
                </div>
            </div>
            
            <div class="card">
                <div class="form-row" style="gap: 12px;">
                    <div style="flex: 0 0 100px;">Tuesday:</div>
                    <input type="time" id="tue-start" value="09:00" style="flex: 0 0 100px;">
                    <span style="margin: auto 8px;">to</span>
                    <input type="time" id="tue-end" value="18:00" style="flex: 0 0 100px;">
                    <select id="tue-type" style="flex: 0 0 90px;">
                        <option value="work">Work</option>
                        <option value="dayoff">Day Off</option>
                    </select>
                </div>
            </div>
            
            <div class="card">
                <div class="form-row" style="gap: 12px;">
                    <div style="flex: 0 0 100px;">Wednesday:</div>
                    <input type="time" id="wed-start" value="09:00" style="flex: 0 0 100px;">
                    <span style="margin: auto 8px;">to</span>
                    <input type="time" id="wed-end" value="18:00" style="flex: 0 0 100px;">
                    <select id="wed-type" style="flex: 0 0 90px;">
                        <option value="work">Work</option>
                        <option value="dayoff">Day Off</option>
                    </select>
                </div>
            </div>
            
            <div class="card">
                <div class="form-row" style="gap: 12px;">
                    <div style="flex: 0 0 100px;">Thursday:</div>
                    <input type="time" id="thu-start" value="09:00" style="flex: 0 0 100px;">
                    <span style="margin: auto 8px;">to</span>
                    <input type="time" id="thu-end" value="18:00" style="flex: 0 0 100px;">
                    <select id="thu-type" style="flex: 0 0 90px;">
                        <option value="work">Work</option>
                        <option value="dayoff">Day Off</option>
                    </select>
                </div>
            </div>
            
            <div class="card">
                <div class="form-row" style="gap: 12px;">
                    <div style="flex: 0 0 100px;">Friday:</div>
                    <input type="time" id="fri-start" value="09:00" style="flex: 0 0 100px;">
                    <span style="margin: auto 8px;">to</span>
                    <input type="time" id="fri-end" value="18:00" style="flex: 0 0 100px;">
                    <select id="fri-type" style="flex: 0 0 90px;">
                        <option value="work">Work</option>
                        <option value="dayoff">Day Off</option>
                    </select>
                </div>
            </div>
            
            <div class="card">
                <div class="form-row" style="gap: 12px;">
                    <div style="flex: 0 0 100px;">Saturday:</div>
                    <input type="time" id="sat-start" value="09:00" style="flex: 0 0 100px;">
                    <span style="margin: auto 8px;">to</span>
                    <input type="time" id="sat-end" value="18:00" style="flex: 0 0 100px;">
                    <select id="sat-type" style="flex: 0 0 90px;">
                        <option value="work">Work</option>
                        <option value="dayoff" selected>Day Off</option>
                    </select>
                </div>
            </div>
            
            <div class="card">
                <div class="form-row" style="gap: 12px;">
                    <div style="flex: 0 0 100px;">Sunday:</div>
                    <input type="time" id="sun-start" value="09:00" style="flex: 0 0 100px;">
                    <span style="margin: auto 8px;">to</span>
                    <input type="time" id="sun-end" value="18:00" style="flex: 0 0 100px;">
                    <select id="sun-type" style="flex: 0 0 90px;">
                        <option value="work">Work</option>
                        <option value="dayoff" selected>Day Off</option>
                    </select>
                </div>
            </div>

            <div class="btn-group" style="margin-bottom: 24px;">
                <button class="btn-primary" onclick="saveSchedule()">Save Schedule</button>
                <button class="btn-secondary" onclick="loadExistingSchedule()">Load Existing Schedule</button>
            </div>

            <h3>Schedule Preview</h3>
            <table id="schedulePreview">
                <thead>
                    <tr><th>Day</th><th>Start Time</th><th>End Time</th><th>Status</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>
    </main>
    <script>
        const dayNames = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
        
        document.addEventListener('DOMContentLoaded', function() {
            loadEmployees();
            const today = new Date();
            const weekStart = getWeekStart(today);
            document.getElementById('scheduleDate').value = weekStart;
            updatePreview();

            document.querySelectorAll('.day-schedule select').forEach(select => {
                select.addEventListener('change', function() {
                    const prefix = this.id.replace('-type', '');
                    const timeInputs = document.querySelectorAll(`[id^="${prefix}-"]`);
                    timeInputs.forEach(input => {
                        if (input.id !== this.id) {
                            input.disabled = this.value === 'dayoff';
                            input.style.opacity = this.value === 'dayoff' ? 0.5 : 1;
                        }
                    });
                    updatePreview();
                });
            });

            const employeeSelect = document.getElementById('employeeSelect');
            if (employeeSelect) {
                employeeSelect.addEventListener('change', function() {
                    loadExistingSchedule();
                });
            }
        });

        function getWeekStart(date) {
            const d = new Date(date);
            const day = d.getDay();
            const diff = d.getDate() - day + (day === 0 ? -6 : 1);
            const monday = new Date(d.setDate(diff));
            return monday.toISOString().split('T')[0];
        }

        function loadEmployees() {
            const employees = JSON.parse(localStorage.getItem('employees') || '[]');
            const select = document.getElementById('employeeSelect');
            employees.forEach(emp => {
                const option = document.createElement('option');
                option.value = emp.name;
                option.textContent = emp.name + ' - ' + emp.department;
                select.appendChild(option);
            });
        }

        function saveSchedule() {
            const employeeName = document.getElementById('employeeSelect').value;
            const scheduleDate = document.getElementById('scheduleDate').value;

            if (!employeeName) {
                alert('Please select an employee!');
                return;
            }
            if (!scheduleDate) {
                alert('Please select a schedule date!');
                return;
            }

            const dayPrefixes = ['mon', 'tue', 'wed', 'thu', 'fri', 'sat', 'sun'];
            const scheduleData = {
                employeeName: employeeName,
                weekStart: scheduleDate,
                type: document.querySelector('input[name="scheduleType"]:checked').value,
                days: {}
            };

            dayPrefixes.forEach((prefix, index) => {
                const dayType = document.getElementById(prefix + '-type').value;
                scheduleData.days[dayNames[index]] = {
                    start: dayType === 'work' ? document.getElementById(prefix + '-start').value : 'OFF',
                    end: dayType === 'work' ? document.getElementById(prefix + '-end').value : 'OFF',
                    type: dayType
                };
            });

            let schedules = JSON.parse(localStorage.getItem('schedules') || '[]');
            const existingIndex = schedules.findIndex(s =>
                s.employeeName === employeeName && s.weekStart === scheduleDate
            );

            if (existingIndex !== -1) {
                schedules[existingIndex] = scheduleData;
            } else {
                schedules.push(scheduleData);
            }

            localStorage.setItem('schedules', JSON.stringify(schedules));
            alert('Schedule saved successfully!');
            updatePreview();
        }

        function loadExistingSchedule() {
            const employeeName = document.getElementById('employeeSelect').value;
            const scheduleDate = document.getElementById('scheduleDate').value;

            if (!employeeName || !scheduleDate) {
                return;
            }

            const schedules = JSON.parse(localStorage.getItem('schedules') || '[]');
            const schedule = schedules.find(s =>
                s.employeeName === employeeName && s.weekStart === scheduleDate
            );

            if (schedule) {
                const dayPrefixes = ['mon', 'tue', 'wed', 'thu', 'fri', 'sat', 'sun'];
                dayPrefixes.forEach((prefix, index) => {
                    const dayData = schedule.days[dayNames[index]];
                    if (dayData) {
                        document.getElementById(prefix + '-type').value = dayData.type;
                        const startInput = document.getElementById(prefix + '-start');
                        const endInput = document.getElementById(prefix + '-end');
                        if (dayData.type === 'work') {
                            startInput.value = dayData.start;
                            endInput.value = dayData.end;
                            startInput.disabled = false;
                            endInput.disabled = false;
                            startInput.style.opacity = 1;
                            endInput.style.opacity = 1;
                        } else {
                            startInput.disabled = true;
                            endInput.disabled = true;
                            startInput.style.opacity = 0.5;
                            endInput.style.opacity = 0.5;
                        }
                    }
                });
                updatePreview();
            }
        }

        function updatePreview() {
            const tbody = document.querySelector('#schedulePreview tbody');
            const dayPrefixes = ['mon', 'tue', 'wed', 'thu', 'fri', 'sat', 'sun'];
            tbody.innerHTML = '';
            dayPrefixes.forEach((prefix, index) => {
                const dayType = document.getElementById(prefix + '-type').value;
                const row = document.createElement('tr');
                row.innerHTML =
                    '<td>' + dayNames[index] + '</td>' +
                    '<td>' + (dayType === 'work' ? document.getElementById(prefix + '-start').value : 'OFF') + '</td>' +
                    '<td>' + (dayType === 'work' ? document.getElementById(prefix + '-end').value : 'OFF') + '</td>' +
                    '<td>' + (dayType === 'work' ? 'Work' : 'Day Off') + '</td>';
                tbody.appendChild(row);
            });
        }
    </script>
</body>
</html>
