<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Employee</title>
    <link rel="stylesheet" href="../public/common.css">
    <link rel="stylesheet" href="../css/add_employee.css">
</head>
<body>
    <main>
        <section>
            <h2>Add Employee</h2>
            <form id="addForm" action="employee_list.html" method="post" enctype="multipart/form-data">
                <div class="form-row">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label>Gender</label>
                        <div style="display: flex; gap: 24px;">
                            <label style="display: flex; align-items: center; gap: 8px;">
                                <input type="radio" id="male" name="gender" value="male" required>
                                male
                            </label>
                            <label style="display: flex; align-items: center; gap: 8px;">
                                <input type="radio" id="female" name="gender" value="female" required>
                                female
                            </label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="age">Age</label>
                        <input type="number" id="age" name="age" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="contact">Contact Information</label>
                        <input type="tel" id="contact" name="contact" minlength="8" maxlength="15" pattern="\d+" required>
                    </div>
                    <div class="form-group">
                        <label for="date">Hire Date</label>
                        <input type="date" id="date" name="date" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="department">Department</label>
                        <select id="department" name="department" required>
                            <option value="" disabled selected>Kindly select</option>
                            <optgroup label="Guest Service Department">
                                <option value="Housekeeping Department">Housekeeping Department</option>
                                <option value="Restaurant and Bar Department">Restaurant and Bar Department</option>
                                <option value="Entertainment Department">Entertainment Department</option>
                                <option value="Sales Department">Sales Department</option>
                                <option value="Marketing Department">Marketing Department</option>
                            </optgroup>
                            <optgroup label="Back office Department">
                                <option value="Finance Department">Finance Department</option>
                                <option value="Human resource Department">Human Resource Department</option>
                                <option value="Engineering Department">Engineering Department</option>
                                <option value="Security Department">Security Department</option>
                                <option value="Purchasing Department">Purchasing Department</option>
                                <option value="Executive Department">Executive Department</option>
                            </optgroup>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="position">Position</label>
                        <select id="position" name="position" required>
                            <option value="" disabled selected>Position Select</option>
                            <option value="Manager">Manager</option>
                            <option value="Deputy Manager">Deputy Manager</option>
                            <option value="Supervisor">Supervisor</option>
                            <option value="Staff">Staff</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="personalInformationDocument">Personal Information Document</label>
                        <input type="file" id="personalInformationDocument" name="personalInformationDocument">
                    </div>
                    <div class="form-group">
                        <label for="employeePhoto">Employee Photo</label>
                        <input type="file" id="employeePhoto" name="employeePhoto">
                    </div>
                </div>

                <div class="btn-group">
                    <button type="submit" class="btn-primary">Add Employee</button>
                    <button type="reset" class="btn-secondary">Reset Form</button>
                </div>
            </form>
        </section>
    </main>
    <script src="../js/add_employee.js"></script>
</body>
</html>
