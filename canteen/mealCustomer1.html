<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Title</title>
    <link rel="stylesheet" href="./styleCus.css">
</head>
<body>
<header>
    <h1>餐饮管理子系统</h1>
    <nav>
        <ul>
            <li><a href=" ">桌位预订</a></li>
            <li><a href="#ordering">自助点餐</a></li>
            <li><a href="#payment">收银与支付</a></li>
            <li><a href="#analytics">数据与反馈</a></li>
        </ul>
    </nav>
</header>

<hr>

<main>
    <section id="booking">
        <h2>桌位在线预订</h2>
        <form action="/api/book-table" method="POST">
            <label for="date">预订日期:</label>
            <input type="date" id="date" name="date" required>

            <label for="time">预订时间:</label>
            <input type="time" id="time" name="time" required>

            <label for="guests">就餐人数:</label>
            <input type="number" id="guests" name="guests" min="1" required>

            <button type="submit">确认预订</button>
        </form>
    </section>

    <hr>

    <section id="ordering">
        <h2>顾客自助点餐区</h2>

        <div class="recommendations">
            <h3>今日主厨推荐</h3>
            <ul>
                <li>招牌烤鸭<span>销量冠军</span>
                    <div>
                        <img src="picture/duck.jpg" alt="烤鸭" width="15%">
                    </div>
                </li>
                <li>时蔬沙拉<span>健康低脂</span>
                    <div>
                        <img src="picture/salad.jpg" alt="沙拉" width="15%">
                    </div>
                </li>
            </ul>
        </div>

        <form action="/api/place-order" method="POST">
            <fieldset>
                <legend>选择菜品</legend>
                <input type="checkbox" id="dish1" name="dish" value="红烧肉" onchange="orderMeal()">
                <label for="dish1">红烧肉 (单点)</label>
                <div>
                    <img src="red-cooked%20pork.png" alt="pork" width="15%">
                </div>
                <div class="price">
                    <span>--36yuan</span>
                </div>
                <select name="taste1">
                    <option value="normal">正常</option>
                    <option value="less-salt">少盐</option>
                </select>
                <br>
                <br>
                <input type="checkbox" id="dish2" name="dish" value="烤鸭" onchange="orderMeal()">
                <label for="dish2">烤鸭</label>
                <div>
                    <img src="picture/duck.jpg" alt="烤鸭" width="15%">
                </div>
                <div class="price">
                    <span>--68yuan</span>
                </div>
                <br>
                <input type="checkbox" id="dish3" name="dish" value="沙拉" onchange="orderMeal()">
                <label for="dish3">沙拉</label>
                <div>
                    <img src="picture/salad.jpg" alt="沙拉" width="15%">
                </div>
                <div class="price">
                    <span>--24yuan</span>
                </div>
                <br>
                <input type="checkbox" id="dish4" name="dish" value="番茄鸡蛋汤" onchange="orderMeal()">
                <label for="dish4">番茄鸡蛋汤</label>
                <div>
                    <img src="picture/soup.jpg" alt="番茄鸡蛋汤" width="15%">
                </div>
                <div class="price">
                    <span>--32yuan</span>
                </div>
                <br>
                <input type="checkbox" id="dish5" name="dish" value="双人套餐A" onchange="orderMeal()">
                <label for="dish5">双人套餐A</label>
                <div>
                    <ul>
                        <li>
                            <span>招牌烤鸭</span>
                        </li>
                        <li>
                            <span>时蔬沙拉</span>
                        </li>
                        <li>
                            <span>番茄鸡蛋汤</span>
                        </li>
                        <li>
                            <span>两份米饭</span>
                        </li>
                    </ul>
                </div>
                <div class="price">
                    <span>--98yuan</span>
                </div>
            </fieldset>

            <fieldset>
                <legend>就餐方式</legend>
                <input type="radio" id="dine-in" name="dining-type" value="dine-in" checked>
                <label for="dine-in">堂食</label>
                <input type="radio" id="takeaway" name="dining-type" value="takeaway">
                <label for="takeaway">外卖配送</label>
            </fieldset>

            <button type="submit" onchange="submitMeal()">提交订单</button>
        </form>
    </section>
    <hr>

    <section id="payment">
        <h2>收银与结账</h2>
        <div class="billing-info">
            <p id="getElementById"></p>
            <p>当前活动折扣 (系统自动计算): -¥20.00</p>
            <p>优惠券抵扣: -¥10.00</p>
            <h3>应付金额: ¥90.00</h3>
        </div>

        <form action="/api/checkout" method="POST">
            <label>选择支付方式:</label>
            <select name="payment-method">
                <option value="wechat">微信支付</option>
                <option value="alipay">支付宝</option>
                <option value="credit-card">银行卡</option>
                <option value="cash">现金</option>
            </select>
            <button type="submit">确认支付并打印发票</button>
        </form>
    </section>
    <section id="analytics">
        <div class="feedback">
            <h3>顾客意见反馈</h3>
            <form action="/api/submit-feedback" method="POST">
                <label for="rating">综合评分:</label>
                <select id="rating" name="rating">
                    <option value="5">5星 - 非常满意</option>
                    <option value="4">4星 - 满意</option>
                    <option value="3">3星 - 一般</option>
                    <option value="2">2星 - 不满意</option>
                    <option value="1">1星 - 极差</option>
                </select>
                <br>
                <textarea placeholder="请留下您宝贵的建议，帮助我们改进..." rows="4" cols="50"></textarea>
                <br>
                <button type="submit">提交反馈</button>
            </form>
        </div>
    </section>
</main>
<script src="dataCus.js"></script>
</body>
</html>
