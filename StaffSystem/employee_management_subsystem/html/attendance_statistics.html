<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Attendance Statistics</title>
    <link rel="stylesheet" href="../public/common.css">
    <link rel="stylesheet" href="../css/attendance_statistics.css">
</head>
<body>
    <main>
        <section>
            <h2>Attendance Statistics & Reports</h2>

            <div class="card">
                <h3>Filter Options</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label for="statEmployee">Employee:</label>
                        <select id="statEmployee">
                            <option value="all">All Employees</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="startDate">Start Date:</label>
                        <input type="date" id="startDate">
                    </div>
                    <div class="form-group">
                        <label for="endDate">End Date:</label>
                        <input type="date" id="endDate">
                    </div>
                </div>
                <div class="btn-group">
                    <button class="btn-primary" onclick="generateStatistics()">Generate Statistics</button>
                    <button class="btn-secondary" onclick="exportReport()">Export Report</button>
                </div>
            </div>

            <div class="stats-cards" id="statsCards">
                <div class="stat-card">
                    <h3>Total Working Days</h3>
                    <div class="number" id="totalDays">0</div>
                </div>
                <div class="stat-card">
                    <h3>Normal Attendance</h3>
                    <div class="number" id="normalCount">0</div>
                </div>
                <div class="stat-card late">
                    <h3>Late Arrivals</h3>
                    <div class="number" id="lateCount">0</div>
                </div>
                <div class="stat-card early">
                    <h3>Early Leaves</h3>
                    <div class="number" id="earlyCount">0</div>
                </div>
                <div class="stat-card absent">
                    <h3>Absences</h3>
                    <div class="number" id="absentCount">0</div>
                </div>
            </div>

            <div class="chart-container">
                <h3>Attendance Overview Chart</h3>
                <div class="bar-chart" id="barChart"></div>
            </div>

            <h3>Detailed Attendance Records</h3>
            <table id="detailedRecords">
                <thead>
                    <tr>
                        <th>Employee</th>
                        <th>Date</th>
                        <th>Clock In</th>
                        <th>Clock Out</th>
                        <th>Status</th>
                        <th>Notes</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>
    </main>
    <script src="../js/attendance_statistics.js"></script>
</body>
</html>
