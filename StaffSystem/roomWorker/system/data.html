<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Data Statistics and Analysis</title>
    <link rel="stylesheet" href="../public/style.css">
    <link rel="stylesheet" href="../systemStyle/data.css">
</head>
<body>
<div id="sidebar-container"></div>
<main>
    <section id="data-analysis">
        <h2>Data Statistics and Analysis</h2>
        <div class="stats">
            <div class="stat-card"><h4>Total Rooms</h4>
                <p>36</p></div>
            <div class="stat-card"><h4>Current Vacant Rooms</h4>
                <p>16</p></div>
            <div class="stat-card"><h4>Occupancy Rate This Month</h4>
                <p>72%</p></div>
            <div class="stat-card"><h4>Monthly Total Revenue</h4>
                <p>¥52860</p></div>
        </div>
        <div class="card">
            <h3>Business Report</h3>
            <table>
                <thead>
                <tr>
                    <th>Month</th>
                    <th>Room Revenue</th>
                    <th>Service Revenue</th>
                    <th>Total Revenue</th>
                    <th>Occupancy Rate</th>
                </tr>
                </thead>
                <tbody id="reportTable">
                </tbody>
            </table>
        </div>
    </section>
</main>
<script src="../../../shared/data.js"></script>
<script src="../public/js.js"></script>
<script src="../js/data.js"></script>
</body>
</html>
