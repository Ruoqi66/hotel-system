<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Room Service & Maintenance</title>
    <link rel="stylesheet" href="../public/style.css">
</head>
<body>
<div id="sidebar-container"></div>
<main>
    <section id="room-service">
        <h2>Room Service & Maintenance</h2>
        <div class="card">
            <h3>Service Application Registration</h3>
            <div class="form-group"><label>Room Number</label><input type="text" placeholder="e.g. 102"></div>
            <div class="form-group">
                <label>Service Type</label>
                <select>
                    <option>Room Cleaning</option>
                    <option>Toiletries Replenishment</option>
                    <option>Water & Electricity Equipment Repair</option>
                    <option>Urgent Cleaning/Arrangement</option>
                </select>
            </div>
            <div class="form-group"><label>Request Notes</label><input type="text" placeholder="Fill in detailed requirements"></div>
            <button class="btn-primary">Submit Application</button>
        </div>
        <div class="card">
            <h3>Service Progress Tracking</h3>
            <table>
                <thead>
                <tr>
                    <th>Room Number</th>
                    <th>Service Type</th>
                    <th>Submission Time</th>
                    <th>Processing Status</th>
                </tr>
                </thead>
                <tbody id="serviceTable">
                </tbody>
            </table>
        </div>
    </section>
</main>
<script src="../../../shared/data.js"></script>
<script src="../public/js.js"></script>
<script src="../js/service.js"></script>
</body>
</html>
