<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Attendance Check</title>
    <link rel="stylesheet" href="../public/common.css">
    <style>
        .clock-section {
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            border-radius: 14px;
            padding: 28px;
            margin-bottom: 24px;
            border: 1px solid #bae6fd;
        }
        
        .clock-section h3 {
            font-size: 18px;
            font-weight: 600;
            color: #0369a1;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid #bae6fd;
        }
        
        .current-time {
            font-size: 48px;
            font-weight: 700;
            color: #0c4a6e;
            text-align: center;
            margin-bottom: 24px;
            font-family: 'Courier New', monospace;
            letter-spacing: 3px;
        }
        
        .clock-btn {
            width: 100%;
            max-width: 200px;
            padding: 16px;
            font-size: 16px;
        }
        
        .btn-warning {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: #ffffff;
            box-shadow: 0 4px 14px rgba(245, 158, 11, 0.3);
        }
        
        .btn-warning:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(245, 158, 11, 0.4);
        }
        
        .adjustment-form {
            background: #fafbfc;
            border-radius: 14px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid #f0f0f0;
        }
        
        .adjustment-form h3 {
            font-size: 18px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid #e2e8f0;
        }
    </style>
</head>
<body>
    <main>
        <section>
            <h2>Attendance Check</h2>
            
            <div class="clock-section">
                <h3>Clock In/Out</h3>
                <div class="current-time" id="currentTime">--:--:--</div>
                
                <div class="form-group">
                    <label for="employeeSelect">Employee:</label>
                    <select id="employeeSelect">
                        <option value="" disabled selected>Select Employee</option>
                    </select>
                </div>
                
                <div class="btn-group">
                    <button class="btn-primary clock-btn" onclick="clockIn()">Clock In</button>
                    <button class="btn-warning clock-btn" onclick="clockOut()">Clock Out</button>
                </div>
            </div>

            <div class="adjustment-form">
                <h3>Manual Attendance Adjustment</h3>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="adjustEmployee">Employee:</label>
                        <select id="adjustEmployee">
                            <option value="" disabled selected>Select Employee</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="adjustDate">Date:</label>
                        <input type="date" id="adjustDate">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="adjustType">Adjustment Type:</label>
                        <select id="adjustType">
                            <option value="leave">Leave</option>
                            <option value="overtime">Overtime</option>
                            <option value="compensatory">Compensatory Leave</option>
                            <option value="absent">Absent</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="adjustHours">Hours:</label>
                        <input type="number" id="adjustHours" min="0" step="0.5" value="8">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="adjustReason">Reason:</label>
                    <input type="text" id="adjustReason" placeholder="Enter reason">
                </div>
                
                <button class="btn-primary" onclick="submitAdjustment()">Submit Adjustment</button>
            </div>

            <h3>Today's Attendance Records</h3>
            <table id="todayRecords">
                <thead>
                    <tr>
                        <th>Employee</th>
                        <th>Date</th>
                        <th>Clock In</th>
                        <th>Clock Out</th>
                        <th>Status</th>
                        <th>Notes</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>
    </main>
    <script src="../js/attendance_check.js"></script>
</body>
</html>
