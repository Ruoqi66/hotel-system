<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Billing & Checkout</title>
    <link rel="stylesheet" href="../public/style.css">
    <link rel="stylesheet" href="../css/payment.css">
</head>
<body>
<main>
    <section id="payment">
        <h2>Billing & Checkout</h2>
        <div class="billing-card">
            <div class="form-item">
                <label for="payNumber">Table Number:</label>
                <select id="payNumber" onchange="calculatePrice()">
                    <option value="1">Table 1</option>
                    <option value="2">Table 2</option>
                    <option value="3">Table 3</option>
                    <option value="4">Table 4</option>
                    <option value="5">Table 5</option>
                    <option value="6">Table 6</option>
                    <option value="7">Table 7</option>
                    <option value="8">Table 8</option>
                </select>
            </div>
            <div class="price-details">
                <p>Original Price: <span>¥<span id="billPrice">0</span></span></p>
                <p>Discount: <span class="minus">-¥<span id="dis">0</span></span></p>
                <p>Coupon: <span class="minus">-¥<span id="cou">0</span></span></p>
                <hr>
                <h3>Amount Due: <span class="total">¥<span id="finalCost">0</span></span></h3>
            </div>
        </div>

        <form class="payment-form">
            <label>Select Payment Method:</label>
            <select name="payment-method">
                <option value="wechat">WeChat Pay</option>
                <option value="alipay">Alipay</option>
                <option value="credit-card">Credit Card</option>
                <option value="cash">Cash</option>
            </select>
            <button type="submit" class="btn-submit">Confirm Payment & Print Invoice</button>
        </form>
    </section>
</main>
<script src="../js/payment.js"></script>
</body>
</html>
