<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Booking - Trips.Hotel</title>
    <link rel="stylesheet" href="../public/style.css">
    <link rel="stylesheet" href="../roomStyle/booking.css">
</head>
<body>
<header>
    <div class="logo">Y</div>
    <h1>YZLUXE.HOTEL</h1>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="rooms.html">Rooms</a></li>
            <li><a href="booking.html">Booking</a></li>
            <li><a href="records.html">My Reservations</a></li>
            <li><a href="feedback.html">Feedback</a></li>
        </ul>
    </nav>
</header>

<main class="container">
    <h2>Online Booking</h2>
    <div class="booking-form">
        <div class="input-group">
            <label>Name</label>
            <input type="text" placeholder="Your Name">
        </div>
        <div class="input-group">
            <label>Phone</label>
            <input type="text" placeholder="Phone Number">
        </div>
        <div class="input-group">
            <label>Room Type</label>
            <select>
                <option>Standard Room</option>
                <option>Standard Suite</option>
                <option>Sea View Round Bed Room</option>
                <option>Pool Suite</option>
            </select>
        </div>
        <div class="input-group">
            <label>Check-in Date</label>
            <input type="date">
        </div>
        <div class="input-group">
            <label>Check-out Date</label>
            <input type="date">
        </div>
        <div class="input-group">
            <label>Breakfast Included</label>
            <select>
                <option value="1">Yes</option>
                <option value="0">No</option>
            </select>
        </div>
        <div class="price-display">
            Estimated Total Price: <span>¥ 0</span>
        </div>
        <div class="button-style">
            <button class="btn-primary">Submit Reservation</button>
        </div>
    </div>
</main>
</body>
</html>
